# Firebase App Hosting configuration for the Variant Discounts Shopify app.
# Runs the React Router 7 SSR server on Cloud Run.

runConfig:
  cpu: 1
  memoryMiB: 512
  minInstances: 0
  maxInstances: 10
  concurrency: 80

env:
  - variable: NODE_ENV
    value: production
    availability:
      - BUILD
      - RUNTIME

  # Shopify embedded app configuration. SHOPIFY_APP_URL is the public URL of
  # the deployed App Hosting backend and must be updated after the first deploy.
  - variable: SHOPIFY_APP_URL
    value: https://variant-discounts--shopify-variant-discounts.europe-west4.hosted.app
    availability:
      - BUILD
      - RUNTIME
  - variable: SCOPES
    value: write_products,write_discounts
    availability:
      - BUILD
      - RUNTIME

  # Secrets — created via `firebase apphosting:secrets:set` and granted access
  # to the App Hosting backend before the first deploy.
  - variable: SHOPIFY_API_KEY
    secret: shopify-api-key
    availability:
      - BUILD
      - RUNTIME
  - variable: SHOPIFY_API_SECRET
    secret: shopify-api-secret
    availability:
      - RUNTIME
